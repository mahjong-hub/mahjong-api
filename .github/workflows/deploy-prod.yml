name: Deploy (Prod)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect_paths:
    runs-on: ubuntu-latest
    outputs:
      modal_changed: ${{ steps.result.outputs.changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect Modal file changes
        id: detect
        if: github.event.before != '0000000000000000000000000000000000000000'
        uses: ./.github/actions/detect-changed-paths
        with:
          base-sha: ${{ github.event.before }}
          include-paths: |
            modal_app/

      - name: Set result
        id: result
        run: |
          BEFORE="${{ github.event.before }}"
          if [[ "$BEFORE" == "0000000000000000000000000000000000000000" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=${{ steps.detect.outputs.changed }}" >> "$GITHUB_OUTPUT"
          fi

  ci-django:
    name: Django API CI
    # Runs unconditionally on every prod tag — CI must always pass before a production release.
    uses: ./.github/workflows/ci-django.yml

  migrate:
    name: Migrate Prod DB
    needs: ci-django
    environment:
      name: production
      url: https://api.mahjongcalc.com
    runs-on: ubuntu-latest
    env:
      DJANGO_ENV: ci
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel pipenv
          pipenv requirements > requirements.txt
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Show migration status
        run: python manage.py showmigrations

  deploy-render:
    name: Deploy Render (Prod)
    needs: migrate
    environment:
      name: production
      url: https://api.mahjongcalc.com
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Render
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl "$RENDER_DEPLOY_HOOK_URL"

  deploy-modal:
    name: Deploy Modal (Prod)
    needs: detect_paths
    if: needs.detect_paths.outputs.modal_changed == 'true'
    environment: production
    runs-on: ubuntu-latest
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      MODAL_ENVIRONMENT: prod
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r modal_app/src/requirements.txt

      - name: Deploy Modal app (prod)
        run: modal deploy -m modal_app.src.app
