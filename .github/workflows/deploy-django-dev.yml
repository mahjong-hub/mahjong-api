name: Deploy Django API (Dev)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  detect_paths:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      django_changed: ${{ steps.result.outputs.changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect Django file changes
        id: detect
        if: github.event_name == 'push'
        uses: ./.github/actions/detect-changed-paths
        with:
          base-sha: ${{ github.event.before }}
          ignore-paths: |
            modal_app/
            .github/

      - name: Set result
        id: result
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "changed=${{ steps.detect.outputs.changed }}" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  django_ci:
    name: Django API CI
    needs: detect_paths
    if: needs.detect_paths.outputs.django_changed == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/ci-django.yml

  migrate:
    name: Migrate Dev DB
    needs: [detect_paths, django_ci]
    if: needs.detect_paths.outputs.django_changed == 'true'
    permissions:
      contents: read
    environment:
      name: development
      url: https://api.dev.mahjongcalc.com
    runs-on: ubuntu-latest
    env:
      DJANGO_ENV: ci
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel pipenv
          pipenv requirements > requirements.txt
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Show migration status
        run: python manage.py showmigrations

  deploy-render:
    name: Deploy Render (Dev)
    needs: migrate
    environment:
      name: development
      url: https://api.dev.mahjongcalc.com
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Render
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl "$RENDER_DEPLOY_HOOK_URL"
